        { name:"郑光祖", dynasty:"元", region:"襄汾", tags:"文学/戏剧", desc:"元曲四大家之一，著《倩女离魂》，浪漫主义戏剧高峰。" },
        { name:"萨都剌", dynasty:"元", region:"雁北", tags:"文学", desc:"元代顶级回族诗人，词作豪放，风格天马行空。" },
        { name:"罗贯中", dynasty:"元末明初", region:"太原", tags:"文学/小说", desc:"章回体小说鼻祖，著《三国演义》，构建宏大三国叙事。" },
        { name:"赵树理", dynasty:"近现代", region:"沁水", tags:"文学/作家", desc:"山药蛋派作家，《小二黑结婚》，记录农村变革。" },
        { name:"石评梅", dynasty:"近现代", region:"平定", tags:"文学/才女", desc:"民国四大才女之一，热血女作家，记录时代青年觉醒。" },
        { name:"司马光", dynasty:"北宋", region:"夏县", tags:"史学", desc:"主编《资治通鉴》，中国史学编年体通史里程碑。" },
        { name:"裴秀", dynasty:"西晋", region:"闻喜", tags:"科学/地图学", desc:"地图学鼻祖，创立“制图六体”，开创地图制图学。" },
        { name:"郦道元", dynasty:"北魏", region:"涿州（属地）", tags:"科学/地理学", desc:"著《水经注》，以水道为纲记录古代地理古迹。" },
        { name:"毕昇", dynasty:"北宋", region:"运城（一说）", tags:"科学/发明", desc:"活字印刷术创造者，人类文明传播的技术革命先驱。" },
        { name:"李春", dynasty:"隋", region:"运城", tags:"科学/工程", desc:"赵州桥（安济桥）设计者，世界最早敞肩石拱桥建筑师。" },
        { name:"预浩", dynasty:"五代/宋", region:"大同", tags:"科学/建筑", desc:"木工专家，著《木经》，《营造法式》问世前的建筑圣经。" },
        { name:"计成", dynasty:"明", region:"运城", tags:"科学/造园", desc:"造园学家，著《园冶》，中国古代造园艺术集大成者。" },
        { name:"张穆", dynasty:"清", region:"平定", tags:"科学/舆地学", desc:"清代西北舆地学奠基人，精于边疆史地，精修山西地图。" },
        { name:"祁韵士", dynasty:"清", region:"寿阳", tags:"科学/史学", desc:"史学家，首创“蒙古史表”体例，研究北方民族史专家。" },
        { name:"赵九章", dynasty:"近现代", region:"开封（生长）", tags:"科学/气象", desc:"中国气象学之父，空间科学先驱，两弹一星元勋。" },
        { name:"邢其毅", dynasty:"近现代", region:"太原", tags:"科学/化学", desc:"有机化学大师，参与合成结晶牛胰岛素。" },
        { name:"任之恭", dynasty:"近现代", region:"沁源", tags:"科学/物理", desc:"中国电子学先驱，物理学家。" },
        { name:"兰锡纯", dynasty:"近现代", region:"河津", tags:"科学/医学", desc:"心脏外科开拓者，中国外科医学奠基人。" },
        { name:"汪堃仁", dynasty:"近现代", region:"希尧", tags:"科学/生理", desc:"中国生理学科奠基人，中科院院士。" },
        { name:"武衡", dynasty:"近现代", region:"山西", tags:"科学/管理", desc:"新中国科技事业组织者，曾任国家科委副主任。" },
        { name:"师旷", dynasty:"春秋", region:"临汾", tags:"艺术/音乐", desc:"晋国乐师，“盲眼琴圣”，能听出琴声中的吉凶。" },
        { name:"傅山", dynasty:"明末清初", region:"太原", tags:"艺术/全才", desc:"神医、书法家、拳学大家，百科全书式学者。" },
        { name:"阎立本", dynasty:"唐", region:"榆林", tags:"艺术/绘画", desc:"唐代顶级画家，《步辇图》作者，现存最早帝王肖像画。" },
        { name:"荆浩", dynasty:"五代", region:"沁水", tags:"艺术/绘画", desc:"五代山水画宗师，北方山水画派鼻祖，创“全景山水”。" },
        { name:"关全", dynasty:"五代", region:"西安（寓居）", tags:"艺术/绘画", desc:"荆浩弟子，“关家山水”，善画秋山寒林，极具苍凉感。" },
        { name:"徐显秀", dynasty:"北齐", region:"太原", tags:"艺术/壁画", desc:"名将，其墓葬壁画是北齐绘画巅峰，色彩艳丽仪仗盛大。" },
        { name:"乔宇", dynasty:"明", region:"平定", tags:"艺术/建筑", desc:"擅书法，参与规划明皇陵等建筑规制，建筑美学参与者。" },
        { name:"丁果仙", dynasty:"近现代", region:"太原", tags:"艺术/戏曲", desc:"晋剧“大王”，创造“丁派”唱腔，山西戏曲泰斗。" },
        { name:"雷履泰", dynasty:"清", region:"平遥", tags:"实业/晋商", desc:"日升昌票号创始人，中国银行业的先驱。" },
        { name:"乔致庸", dynasty:"清", region:"祁县", tags:"实业/晋商", desc:"晋商乔家领袖，秉持“诚、信、义”，实现汇通天下。" },
        { name:"王相卿", dynasty:"清", region:"太谷", tags:"实业/晋商", desc:"旅蒙商鼻祖，创办“大盛魁”，横跨中俄的商业帝国。" },
        { name:"常万达", dynasty:"清", region:"榆次", tags:"实业/晋商", desc:"常家大院主人，中俄茶叶之路核心经营者，“万里茶路”传奇。" },
        { name:"渠本翘", dynasty:"清", region:"祁县", tags:"实业/革命", desc:"晋商领袖，“保晋运动”发起人，以商业力量守护山西矿产。" },
        { name:"王现", dynasty:"清", region:"平遥", tags:"实业/晋商", desc:"日升昌早期奠基人，注重信誉与制度创新的晋商先驱。" },
        { name:"介子推", dynasty:"春秋", region:"介休", tags:"传说/忠义", desc:"“割股奉君”的忠义之士，清明节（寒食节）起源人物。" },
        { name:"公孙杵臼", dynasty:"春秋", region:"襄汾", tags:"传说/侠义", desc:"赵氏孤儿义士，与程婴舍身取义，践行士为知己者死。" },
        { name:"程婴", dynasty:"春秋", region:"襄汾", tags:"传说/侠义", desc:"抚育赵氏孤儿十五年，忍辱负重的大忠之人。" },
        { name:"貂蝉", dynasty:"东汉", region:"忻州", tags:"传说/美女", desc:"四大美女之一，连环计核心人物，演绎吕布与董卓情仇。" },
        { name:"杨玉环", dynasty:"唐", region:"运城", tags:"传说/美女", desc:"四大美女之一，“霓裳羽衣舞”主角，盛唐兴衰的见证者。" },
        { name:"王宝钏", dynasty:"传说", region:"太原", tags:"传说/爱情", desc:"戏曲人物，寒窑苦守十八天，山西民间爱情经典IP。" },
        { name:"豫让", dynasty:"战国", region:"晋中", tags:"传说/刺客", desc:"“士为知己者死”极致践行者，漆身吞炭刺赵襄子。" },
        { name:"高君宇", dynasty:"近现代", region:"静乐", tags:"革命/先驱", desc:"山西早期共产党领导人，热血革命者，与石评梅有动人爱情。" },
        { name:"傅作义", dynasty:"近现代", region:"荣河", tags:"革命/名将", desc:"抗日名将，涿州守城战成名，促成北平和平解放。" },
        { name:"刘胡兰", dynasty:"近现代", region:"文水", tags:"革命/英烈", desc:"革命烈士，年仅15岁英勇就义，精神永存。" },
        { name:"马明方", dynasty:"近现代", region:"克虎", tags:"革命/教育", desc:"陕甘宁边区政府副主席，重视教育与人才培养。" }
    ];

    // 补充分类主领域
    const data = rawData.map(item => {
        let mainCat = '其他';
        const t = item.tags.toLowerCase();
        if (t.includes('政治') || item.tags.includes('近代政治')) mainCat = '政治';
        else if (t.includes('军事')) mainCat = '军事';
        else if (t.includes('文学') || item.tags.includes('文学') || item.tags.includes('史学')) mainCat = '文学';
        else if (t.includes('艺术') || item.tags.includes('壁画') || item.tags.includes('音乐') || item.tags.includes('绘画')|| item.tags.includes('戏曲')) mainCat = '艺术';
        else if (t.includes('科学') || t.includes('地图') || t.includes('发明') || t.includes('工程') || t.includes('建筑')|| t.includes('气象')|| t.includes('化学')|| t.includes('物理')|| t.includes('生理')) mainCat = '科学';
        else if (t.includes('医学') || item.tags.includes('药王')|| item.tags.includes('火神')) mainCat = '医学';
        else if (t.includes('思想') || t.includes('哲学')|| t.includes('玄学')) mainCat = '思想';
        else if (t.includes('宗教') || t.includes('净土')|| t.includes('佛')) mainCat = '宗教';
        else if (t.includes('传说') || t.includes('美女')|| t.includes('刺客')|| t.includes('忠义')) mainCat = '传说';
        else if (t.includes('革命') || t.includes('英烈')|| t.includes('法治')|| t.includes('教育')|| t.includes('先驱')) mainCat = '革命';
        else if (t.includes('晋商') || t.includes('实业')) mainCat = '晋商';
        else mainCat = '其他';
        return { ...item, mainCat };
    });

    // 提取热门地区（前15）
    const regionCount = new Map();
    data.forEach(p => regionCount.set(p.region, (regionCount.get(p.region) || 0) + 1));
    const topRegions = Array.from(regionCount.entries())
        .sort((a, b) => b[1] - a[1])
        .map(entry => entry[0])
        .slice(0, 15);

    const regionBar = document.getElementById('regionBar');
    topRegions.forEach(region => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = region;
        btn.setAttribute('data-region', region);
        btn.addEventListener('click', () => {
            searchInput.value = region;
            searchBtn.click();
        });
        regionBar.appendChild(btn);
    });
    document.getElementById('clearRegionBtn').addEventListener('click', () => {
        searchInput.value = '';
        searchBtn.click();
    });

    // 提取热门朝代（前15）
    const dynastyCount = new Map();
    data.forEach(p => dynastyCount.set(p.dynasty, (dynastyCount.get(p.dynasty) || 0) + 1));
    const topDynasties = Array.from(dynastyCount.entries())
        .sort((a, b) => b[1] - a[1])
        .map(entry => entry[0])
        .slice(0, 15);

    const dynastyBar = document.getElementById('dynastyBar');
    topDynasties.forEach(dynasty => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.textContent = dynasty;
        btn.setAttribute('data-dynasty', dynasty);
        btn.addEventListener('click', () => {
            searchInput.value = dynasty;
            searchBtn.click();
        });
        dynastyBar.appendChild(btn);
    });
    document.getElementById('clearDynastyBtn').addEventListener('click', () => {
        searchInput.value = '';
        searchBtn.click();
    });

    // 原有筛选逻辑
    const grid = document.getElementById('cardsGrid');
    const displaySpan = document.getElementById('displayCount');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    let currentCategory = 'all';
    let searchText = '';

    function filterCards() {
        let filtered = data.filter(person => {
            if (currentCategory !== 'all' && person.mainCat !== currentCategory) return false;
            if (searchText.trim() !== '') {
                const haystack = (person.name + person.dynasty + person.region + person.desc + person.tags).toLowerCase();
                return haystack.includes(searchText.toLowerCase().trim());
            }
            return true;
        });
        displaySpan.innerText = filtered.length;
        renderGrid(filtered);
    }

    function renderGrid(items) {
        if (items.length === 0) {
            grid.innerHTML = `<div class="empty-message">🏜️ 没有匹配的名人，试试其他关键词或分类</div>`;
            return;
        }
        let html = '';
        items.forEach(p => {
            const avatarChar = p.name.charAt(0);
            const tagArr = p.tags.split('/').map(s => s.trim());
            const allTags = [p.mainCat, ...tagArr.filter(t => t !== p.mainCat)].slice(0, 3);
            html += `
            <div class="card">
                <div class="card-avatar">${avatarChar}</div>
                <div class="card-name">
                    ${p.name}
                    <span class="dynasty">${p.dynasty}</span>
                </div>
                <div class="card-loc">
                    <span>📍 ${p.region}</span>
                    <i>${p.mainCat}</i>
                </div>
                <div class="card-tags">
                    ${allTags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                <div class="card-desc">${p.desc}</div>
            </div>
            `;
        });
        grid.innerHTML = html;
    }

    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            filterCards();
        });
    });

    searchBtn.addEventListener('click', () => {
        searchText = searchInput.value;
        filterCards();
    });
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
            searchText = searchInput.value;
            filterCards();
        }
    });

    // 初始渲染
    renderGrid(data);
    displaySpan.innerText = data.length;
})();
</script>
</body>
</html>
