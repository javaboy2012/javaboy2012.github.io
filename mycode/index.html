<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春晓 - 春天的诗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #f0f8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .flower {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffb3d9;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .flower:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .flower:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; background: #ffcccb; }
        .flower:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 2s; background: #98fb98; }
        .flower:nth-child(4) { bottom: 30%; right: 10%; animation-delay: 3s; }
        .flower:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; background: #f0e68c; }
        .flower:nth-child(6) { top: 70%; right: 25%; animation-delay: 5s; background: #dda0dd; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(144, 238, 144, 0.3);
            position: relative;
            z-index: 1;
        }

        .title {
            text-align: center;
            color: #2d5016;
            font-size: 2.5em;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .poem-container {
            background: linear-gradient(135deg, #f0fff0 0%, #e6ffe6 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 3px solid #90ee90;
            position: relative;
            overflow: hidden;
        }

        .poem-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(144, 238, 144, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .poem {
            text-align: center;
            font-size: 1.8em;
            line-height: 2.2;
            color: #2d5016;
            position: relative;
            z-index: 1;
        }

        .poem-line {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            border-left: 4px solid #90ee90;
            transition: all 0.3s ease;
        }

        .poem-line:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .author {
            text-align: center;
            font-size: 1.2em;
            color: #666;
            margin-top: 20px;
            font-style: italic;
        }

        .description {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 248, 220, 0.8);
            border-radius: 10px;
            border: 2px solid #f0e68c;
        }

        .spring-decoration {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #90ee90;
            border-radius: 50%;
            opacity: 0.6;
            animation: bounce 3s ease-in-out infinite;
        }

        .spring-decoration:nth-child(1) { top: 10px; right: 20px; animation-delay: 0s; }
        .spring-decoration:nth-child(2) { bottom: 15px; left: 25px; animation-delay: 1s; background: #ffb3d9; }
        .spring-decoration:nth-child(3) { top: 20px; left: 15px; animation-delay: 2s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 20px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .poem {
                font-size: 1.5em;
            }
            
            .poem-line {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰性花朵 -->
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>

    <!-- 春天装饰 -->
    <div class="spring-decoration"></div>
    <div class="spring-decoration"></div>
    <div class="spring-decoration"></div>

    <div class="container">
        <h1 class="title">🌸 春晓 🌸</h1>
        
        <div class="poem-container">
            <div class="poem">
                <div class="poem-line">春眠不觉晓</div>
                <div class="poem-line">处处闻啼鸟</div>
                <div class="poem-line">夜来风雨声</div>
                <div class="poem-line">花落知多少</div>
            </div>
            <div class="author">—— 唐·孟浩然</div>
        </div>

        <div class="description">
            <p>这首诗描绘了春天早晨的美好景象，诗人睡到很晚才醒来，听到窗外鸟儿的鸣叫声，想起昨晚的风雨声，不禁感叹花儿落了多少。整首诗充满了春天的生机和诗意。</p>
        </div>
    </div>

    <script>
        // 添加一些交互效果
        document.addEventListener('DOMContentLoaded', function() {
            const poemLines = document.querySelectorAll('.poem-line');
            
            poemLines.forEach((line, index) => {
                line.addEventListener('click', function() {
                    this.style.background = 'rgba(144, 238, 144, 0.3)';
                    setTimeout(() => {
                        this.style.background = 'rgba(255, 255, 255, 0.7)';
                    }, 1000);
                });
                
                // 添加渐入动画
                line.style.opacity = '0';
                line.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    line.style.transition = 'all 0.6s ease';
                    line.style.opacity = '1';
                    line.style.transform = 'translateY(0)';
                }, index * 200);
            });
        });
    </script>
</body>
</html>
