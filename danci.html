<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>词场大冒险 - Word Quest Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #5C6BC0; --secondary: #FFCA28; --success: #66BB6A;
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮蓝框 */
            touch-action: manipulation; /* 提高触控响应速度 */
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            height: 100svh; /* 适配移动端动态视口高度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* 防止移动端滚动条干扰 */
        }

        /* 响应式顶部状态栏 */
        .header {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #unit-title {
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: var(--primary);
        }

        .score-container {
            font-size: 20px;
            font-weight: bold;
            color: #d35400;
            background: white;
            padding: 5px 15px;
            border-radius: 50px;
        }

        /* 响应式卡片系统 */
        .card-container {
            width: 90%;
            max-width: 350px;
            height: 65svh; /* 根据视口高度自动伸缩 */
            perspective: 1000px;
            margin: 10px 0;
            position: relative;
        }

        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly; /* 自动分配纵向空间 */
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--card-shadow);
            border: 6px solid white;
            padding: 15px;
        }

        .card-back { transform: rotateY(180deg); background: #f9fbe7; }

        .hint-btn {
            position: absolute; top: 10px; right: 10px;
            background: #FFF9C4; border: 2px solid #FBC02D;
            border-radius: 50%; width: 42px; height: 42px;
            font-size: 20px; z-index: 30;
            box-shadow: 0 3px 0 #F9A825;
        }

        /* 元素缩放适配 */
        .word-image { font-size: 70px; margin: 0; }
        .audio-btn { background: #E8EAF6; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 18px; }
        .word-meaning { font-size: 1.4rem; font-weight: bold; color: #444; }

        /* 字母槽位：小屏自动换行或缩小 */
        .slots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; min-height: 40px; width: 100%; }
        .slot {
            width: 28px; height: 35px;
            border-bottom: 3px solid #BDBDBD;
            text-align: center; font-size: 24px; font-weight: bold; color: var(--primary);
        }
        .slot.filled { border-bottom-color: var(--success); }

        /* 字母按钮池：移动端大按钮点击更准 */
        .letters-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
        .letter-btn {
            background: white; border: none; box-shadow: 0 4px 0 #ddd;
            color: var(--primary); width: 45px; height: 45px;
            border-radius: 10px; font-size: 20px; font-weight: bold;
        }
        .letter-btn.used { opacity: 0; transform: scale(0); }

        .back-to-quiz-btn {
            display: none; padding: 12px 20px;
            background: var(--success); color: white; border: none;
            border-radius: 50px; font-size: 16px; font-weight: bold;
        }

        /* 输入区适配：防止移动端键盘弹出时遮挡 */
        .input-area {
            width: 90%; padding: 12px;
            border: 3px solid var(--secondary); border-radius: 12px;
            font-size: 20px; text-align: center; font-weight: bold;
        }

        #success-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }

        @keyframes hint-shake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); border-color: var(--secondary); } }
        .hint-highlight { animation: hint-shake 0.4s ease 3; }
        @keyframes pulse-hint { from { color: var(--primary); } to { color: var(--secondary); } }
        .pulse-text { animation: pulse-hint 0.5s infinite alternate; }
    </style>
</head>
<body>

    <div class="header">
        <div id="unit-title">Loading...</div>
        <div class="score-container">🪙 <span id="score">0</span></div>
    </div>

    <div class="card-container">
        <button class="hint-btn" onclick="handleMasterHint()">💡</button>
        <div class="card" id="main-card">
            <div class="card-face card-front">
                <div class="word-image" id="word-icon">🍎</div>
                <button class="audio-btn" onclick="playAudio(event)">🔊</button>
                <div class="word-meaning" id="word-desc">苹果</div>
                <div class="slots" id="letter-slots"></div>
                <div class="letters-pool" id="jumbled-pool"></div>
                <button id="back-to-quiz" class="back-to-quiz-btn" onclick="flipBackToQuiz()">我记住了，去拼写！🚀</button>
            </div>

            <div class="card-face card-back">
                <div class="word-image">❓</div>
                <h3 style="color:var(--primary); margin: 10px 0;">拼出刚才的单词</h3>
                <input type="text" class="input-area" id="word-input" placeholder="点击输入..." autocomplete="off" enterkeyhint="done">
                <p id="error-tip" style="color: #e74c3c; font-size: 13px; margin: 5px 0; opacity: 0;">点灯泡可以回看哦！</p>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <h1 style="font-size: 32px; color: var(--success); margin-bottom: 10px;">太棒了！🔥</h1>
        <h2 id="point-gain" style="margin: 0;">+20 POINTS</h2>
    </div>

    <script>
        const lessonData = {
            unit: "Unit 1: 森林词汇",
            words: [
                { text: "apple", emoji: "🍎", translation: "苹果" },
                { text: "bear", emoji: "🐻", translation: "小熊" },
                { text: "cake", emoji: "🍰", translation: "蛋糕" },
                { text: "duck", emoji: "🦆", translation: "小鸭" }
            ]
        };

        let currentIdx = 0, score = 0, currentGuess = [], errorCount = 0, hasLookedBack = false;

        function initWord() {
            const word = lessonData.words[currentIdx];
            document.getElementById('word-icon').innerText = word.emoji;
            document.getElementById('word-desc').innerText = word.translation;
            document.getElementById('unit-title').innerText = lessonData.unit;
            
            const slots = document.getElementById('letter-slots');
            slots.innerHTML = '';
            word.text.split('').forEach(() => slots.innerHTML += '<div class="slot"></div>');

            currentGuess = []; errorCount = 0; hasLookedBack = false;
            
            document.getElementById('jumbled-pool').style.display = 'flex';
            document.getElementById('back-to-quiz').style.display = 'none';
            document.getElementById('main-card').classList.remove('is-flipped');
            document.getElementById('word-input').value = '';
            document.getElementById('error-tip').style.opacity = '0';

            const jumbled = word.text.split('').sort(() => Math.random() - 0.5);
            const pool = document.getElementById('jumbled-pool');
            pool.innerHTML = '';
            jumbled.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.innerText = char;
                // 适配触控和点击
                btn.onclick = (e) => handleLetterSelect(char, e.target);
                pool.appendChild(btn);
            });
            
            setTimeout(() => speak(word.text), 600);
        }

        function handleMasterHint() {
            const card = document.getElementById('main-card');
            const isFlipped = card.classList.contains('is-flipped');
            
            if (!isFlipped) {
                if (score < 2) { alert("金币不足"); return; }
                const word = lessonData.words[currentIdx];
                const nextChar = word.text[currentGuess.length];
                const buttons = document.querySelectorAll('.letter-btn:not(.used)');
                for (let btn of buttons) {
                    if (btn.innerText === nextChar) {
                        score -= 2; updateScore();
                        btn.classList.add('hint-highlight');
                        setTimeout(() => btn.classList.remove('hint-highlight'), 1200);
                        break;
                    }
                }
            } else {
                hasLookedBack = true;
                card.classList.remove('is-flipped');
                document.getElementById('jumbled-pool').style.display = 'none';
                document.getElementById('back-to-quiz').style.display = 'block';
                document.querySelectorAll('.slot').forEach(s => s.classList.add('pulse-text'));
            }
        }

        function flipBackToQuiz() {
            document.getElementById('main-card').classList.add('is-flipped');
            setTimeout(() => {
                document.getElementById('jumbled-pool').style.display = 'flex';
                document.getElementById('back-to-quiz').style.display = 'none';
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('pulse-text'));
                document.getElementById('word-input').focus();
            }, 600);
        }

        function handleLetterSelect(char, btn) {
            const word = lessonData.words[currentIdx];
            if (char === word.text[currentGuess.length]) {
                const slot = document.getElementById('letter-slots').children[currentGuess.length];
                slot.innerText = char;
                slot.classList.add('filled');
                currentGuess.push(char);
                btn.classList.add('used');
                speak(char);
                if (currentGuess.length === word.text.length) {
                    setTimeout(() => {
                        document.getElementById('main-card').classList.add('is-flipped');
                        document.getElementById('word-input').focus();
                        score += 10; updateScore();
                    }, 600);
                }
            }
        }

        document.getElementById('word-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const word = lessonData.words[currentIdx];
                if (document.getElementById('word-input').value.toLowerCase() === word.text.toLowerCase()) {
                    showSuccess();
                } else {
                    errorCount++;
                    document.getElementById('error-tip').style.opacity = '1';
                    if (errorCount >= 3) setTimeout(handleMasterHint, 500);
                }
            }
        });

        function showSuccess() {
            const overlay = document.getElementById('success-overlay');
            const bonus = hasLookedBack ? 10 : 20; 
            document.getElementById('point-gain').innerText = `+${bonus} POINTS`;
            overlay.style.display = 'flex';
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 } });
            score += bonus; updateScore();
            speak(lessonData.words[currentIdx].text);
            setTimeout(() => {
                overlay.style.display = 'none';
                currentIdx = (currentIdx + 1) % lessonData.words.length;
                initWord();
            }, 1800);
        }

        function updateScore() { document.getElementById('score').innerText = score; }
        function playAudio(e) { e.stopPropagation(); speak(lessonData.words[currentIdx].text); }
        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US'; m.rate = 0.9;
            window.speechSynthesis.speak(m);
        }
        initWord();
    </script>
</body>
</html>
